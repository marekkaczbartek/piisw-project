@if (store.isLoggedIn()) {
  <div class="app-shell">
    <header class="topbar">
      <div style="display: flex; align-items: center; gap: 4px;">
        <a class="brand" [routerLink]="landingUrl()">
          <span>eBilet</span>
          <span class="dot"></span>
        </a>

        @if (store.user()?.role === 'PASSENGER') {
          <nav class="topnav">
            <a routerLink="/browse" routerLinkActive="active">Oferta</a>
          </nav>
        }
        @if (store.user()?.role === 'INSPECTOR') {
          <nav class="topnav">
            <a routerLink="/inspector" routerLinkActive="active">Kontrola</a>
          </nav>
        }
      </div>

      <div class="user-area">
        <div class="user-line">
          <div class="what">Zalogowany jako</div>
          <div class="who">{{ store.user()?.firstName }} {{ store.user()?.lastName }}</div>
        </div>
        <button type="button" class="logout" (click)="logout()">Wyloguj</button>
      </div>
    </header>

    <router-outlet />
  </div>
} @else {
  <router-outlet />
}

<app-toast />
