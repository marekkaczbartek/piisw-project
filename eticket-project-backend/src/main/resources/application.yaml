spring:
  application:
    name: eticket-project-backend
  datasource:
    url: jdbc:h2:mem:eticketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: wNn9n1wH2lQXHmpd2nq5W6JdVwT1r5xF3hP2a1p9nQw=
    issuer: eticket
    expiration-minutes: 60
  seed:
    enabled: true
