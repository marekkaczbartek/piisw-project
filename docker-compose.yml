services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./eticket-project-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eticket
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8081,http://localhost:4200
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build: ./eticket-project-frontend
    ports:
      - "8081:80"

volumes:
  pgdata:
